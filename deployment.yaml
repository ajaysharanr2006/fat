apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-app-deployment
  labels:
    app: matrix-multiply
spec:
  replicas: 2
  selector:
    matchLabels:
      app: matrix-multiply
  template:
    metadata:
      labels:
        app: matrix-multiply
    spec:
      containers:
      - name: matrix-app
        image: ajay23mis0669/simple-app-java:latest
        ports:
        - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: matrix-app-service
spec:
  type: NodePort
  selector:
    app: matrix-multiply
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
      nodePort: 30007
